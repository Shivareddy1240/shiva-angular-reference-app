<div class="grid">@for(item of items(); track item.company){<article class="card">
<div class="spaced">
<div>
<h3>{{item.role}}</h3>
<p class="muted">{{item.company}}</p>
</div>
<span class="badge">{{item.period}}</span>
</div>
<ul>@for(p of item.points; track p){<li>{{p}}</li>}</ul>
</article>}</div>
