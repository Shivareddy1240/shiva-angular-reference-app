<header class="top"><div class="container nav"><a routerLink="/" class="brand"><span class="gradient-text">Shiva</span> Angular Lab</a><nav class="links">@for (link of links; track link.path) {<a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: link.path === '/' }">{{ link.label }}</a>}<app-command-palette /><app-theme-toggle /></nav><button class="btn ghost menu" type="button" (click)="toggleMenu()">☰</button></div><nav class="container mobile" [class.open]="open()">@for (link of links; track link.path) {<a [routerLink]="link.path" (click)="closeMenu()">{{ link.label }}</a>}<app-command-palette /><app-theme-toggle /></nav></header>
