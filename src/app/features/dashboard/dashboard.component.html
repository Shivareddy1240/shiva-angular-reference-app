<section class="page"><div class="container"><app-section-header eyebrow="Dashboard" title="Signals dashboard and local app data" description="Computed Signals summarize projects, skills, favorites, notes and contact messages." /><div class="grid grid-3"><app-stat-card label="Projects" [value]="data.projects().length" /><app-stat-card label="Favorites" [value]="data.favoriteProjects().length" /><app-stat-card label="Messages" [value]="data.contactMessages().length" /><app-stat-card label="Notes" [value]="data.notes().length" /><app-stat-card label="Skill Score" [value]="data.totalSkillScore() + '%'" /><app-stat-card label="Activities" [value]="data.activities.length" /></div><div class="grid grid-2 dashboard-grid"><article class="card"><h3>GitHub-style activity</h3><div class="activity-grid">@for (item of data.activities; track item.title) {<div class="activity-dot" [title]="item.title"></div>}</div><ul>@for (item of data.activities; track item.title) { <li><b>{{ item.type }}:</b> {{ item.title }}</li> }</ul></article><article class="card" *appRoleOnly="'admin'"><h3>Admin-only structural directive demo</h3><p class="muted">This card appears because the simulated role is admin.</p><button class="btn primary" type="button" (click)="copyExport()">Copy JSON Export</button></article></div></div></section>
