<section class="page"><div class="container"><app-section-header eyebrow="Projects" title="Search, filter and favorite projects" description="Demonstrates services, Signals, computed state, child outputs and localStorage favorites." /><div class="card toolbar"><input class="input" placeholder="Search projects or technologies..." [ngModel]="search()" (ngModelChange)="search.set($event)"><div class="pill-row">@for (item of data.projectCategories(); track item) {<button class="btn ghost" type="button" [class.active-chip]="category() === item" (click)="setCategory(item)">{{ item }}</button>}</div><button class="btn primary" type="button" (click)="addSampleProject()">Add Sample Project</button></div>@if (filtered().length) {<div class="grid grid-3 project-grid">@for (project of filtered(); track project.id) {<app-project-card [project]="project" [favorite]="data.isFavorite(project.id)" (favoriteChange)="toggleFavorite($event)" />}</div>} @else {<app-empty-state title="No projects found" message="Try another search term or category." />}</div></section>
