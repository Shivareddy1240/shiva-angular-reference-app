<section class="page"><div class="container"><app-section-header eyebrow="Angular Lab" title="Most-used Angular features in one place" description="A practical reference page for binding, forms, signals, RxJS, directives, pipes, content projection and ViewChild." /><div class="grid grid-2"><app-feature-demo-card feature="Binding" title="Interpolation, event binding and two-way binding" description="Change the name and click the button."><input #titleInput class="input" [(ngModel)]="name"><p>Hello, <b>{{ name | uppercase }}</b></p><button class="btn ghost" type="button" (click)="increaseClicks()">Clicked {{ clicks() }} times</button></app-feature-demo-card><app-feature-demo-card feature="Signals" title="Signal and computed state" description="Signals update local UI state without external libraries."><button class="btn primary" type="button" (click)="improveScore()">Improve Score</button><p>Score: {{ score() }}</p><p>Doubled computed score: {{ doubledScore() }}</p><app-code-preview [code]="signalCode" /></app-feature-demo-card><app-feature-demo-card feature="RxJS" title="Observable stream with async pipe" description="Useful for events, async workflows and APIs."><button class="btn ghost" type="button" (click)="nextRx()">Next Observable Value</button><p>Observable value: {{ rxValue$ | async }}</p></app-feature-demo-card><app-feature-demo-card feature="Directive" title="Custom structural directive" description="This content appears only for the simulated admin role."><div *appRoleOnly="role" class="notice">Visible because role is {{ role }}.</div></app-feature-demo-card><app-feature-demo-card feature="ViewChild" title="Access template element" description="ViewChild reads the template input after view initialization."><p>{{ viewMessage() }}</p></app-feature-demo-card><app-feature-demo-card feature="Defer" title="Deferrable views" description="The home page project cards use &#64;defer with skeleton placeholders."><p class="muted">Check Home page source for &#64;defer, &#64;placeholder and reusable skeleton cards.</p></app-feature-demo-card></div></div></section>
