<section class="page">
<div class="container">
<app-section-header eyebrow="Writing" title="Technical blog ideas" description="Use this section to publish LinkedIn posts, notes and GitHub articles."/>
<div class="grid grid-3">@for(post of data.blogs; track post.title){<article class="card">
<span class="badge">{{post.readTime}}</span>
<h3>{{post.title}}</h3>
<p class="muted">{{post.description}}</p>
<div class="pill-row">@for(tag of post.tags; track tag){<span class="badge">{{tag}}</span>}</div>
</article>}</div>
</div>
</section>
