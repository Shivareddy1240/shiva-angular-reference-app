<section class="page"><div class="container"><app-section-header eyebrow="Local Notes" title="Add, list and delete local notes" description="Demonstrates simple CRUD with signals and localStorage." /><div class="grid grid-2"><article class="card form"><input class="input" placeholder="Note title" [(ngModel)]="title"><textarea class="input" rows="6" placeholder="Write a learning note..." [(ngModel)]="body"></textarea><button class="btn primary" type="button" (click)="add()">Add Note</button></article><div class="note-list">@for (note of data.notes(); track note.id) {<article class="card note"><div class="spaced"><h3>{{ note.title }}</h3><button class="btn ghost" type="button" (click)="delete(note.id)">Delete</button></div><p class="muted">{{ note.createdAt | date:'medium' }}</p><p>{{ note.body }}</p></article>} @empty {<article class="card"><p class="muted">No notes yet. Add your first learning note.</p></article>}</div></div></div></section>
